<svg width="583" height="61" viewBox="0 0 583 61" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  /* Slow breathing animation - center to edges, inside-out pulse */
  @keyframes pulse-center {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.7; }
  }
  
  @keyframes pulse-inner {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }
  
  @keyframes pulse-mid {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.35; }
  }
  
  @keyframes pulse-outer {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.2; }
  }
  
  @keyframes pulse-edge {
    0%, 100% { opacity: 0.05; }
    50% { opacity: 0.1; }
  }
</style>

<!-- Grid lines -->
<line x1="15.65" y1="61" x2="15.65" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="84.625" y1="61" x2="84.625" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<line x1="153.4" y1="61" x2="153.4" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="222.375" y1="61" x2="222.375" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="291.15" y1="61" x2="291.15" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="360.125" y1="61" x2="360.125" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="428.9" y1="61" x2="428.9" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="497.875" y1="61" x2="497.875" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<path d="M567 61L567 -1.37091e-06" stroke="#848484" stroke-width="0.7"/>

<!-- Layered diamonds - progressively narrower from outside to inside with stepped colors -->
<!-- Outermost diamond - widest, darkest, tallest -->
<path d="M16 35V26L291.5 5L567 26V35L291.5 56L16 35Z" fill="#1A1916" style="animation: pulse-edge 3s ease-in-out infinite; animation-delay: 1.2s;"/>

<!-- Layer 2 - 75% width -->
<path d="M85 34V27L291.5 9L498 27V34L291.5 53L85 34Z" fill="#2E2C26" style="animation: pulse-outer 3s ease-in-out infinite; animation-delay: 0.9s;"/>

<!-- Layer 3 - 55% width -->
<path d="M139 33V28L291.5 13L444 28V33L291.5 49L139 33Z" fill="#3F3D34" style="animation: pulse-mid 3s ease-in-out infinite; animation-delay: 0.6s;"/>

<!-- Layer 4 - 35% width -->
<path d="M195 32V29L291.5 18L388 29V32L291.5 44L195 32Z" fill="#514E40" style="animation: pulse-inner 3s ease-in-out infinite; animation-delay: 0.3s;"/>

<!-- Innermost diamond - 15% width (taller than wide), lightest -->
<path d="M250 31V30L291.5 23L333 30V31L291.5 39L250 31Z" fill="#615F4C" style="animation: pulse-center 3s ease-in-out infinite; animation-delay: 0s;"/>

</svg>
