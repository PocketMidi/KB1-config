<svg width="583" height="63" viewBox="0 0 583 63" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  /* Slow breathing animation - center to edges, inside-out pulse */
  @keyframes pulse-center {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  
  @keyframes pulse-inner {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.55; }
  }
  
  @keyframes pulse-mid {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.45; }
  }
  
  @keyframes pulse-outer {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.35; }
  }
  
  @keyframes pulse-edge {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.25; }
  }
</style>

<!-- Grid lines -->
<line x1="15.65" y1="61" x2="15.65" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="84.625" y1="61" x2="84.625" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<line x1="153.4" y1="61" x2="153.4" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="222.375" y1="61" x2="222.375" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="291.15" y1="61" x2="291.15" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="360.125" y1="61" x2="360.125" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="428.9" y1="61" x2="428.9" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="497.875" y1="61" x2="497.875" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<path d="M567 61L567 -1.37091e-06" stroke="#848484" stroke-width="0.7"/>

<!-- Layered diamonds based on diamond.svg design - 5 layers -->
<!-- Layer 5 - Outermost (widest) -->
<path d="M583 33C583 33 368.5 35.5 291.5 63V1C370.5 26.5 583 33 583 33Z" fill="#9F9C80" fill-opacity="0.35" style="animation: pulse-edge 3s ease-in-out infinite; animation-delay: 1.2s;"/>
<path d="M0 30C0 30 214.5 27.5 291.5 0V62C212.5 36.5 0 30 0 30Z" fill="#9F9C80" fill-opacity="0.35" style="animation: pulse-edge 3s ease-in-out infinite; animation-delay: 1.2s;"/>

<!-- Layer 4 -->
<path d="M498 33C498 33 346 35.5 291.5 63V1C347.5 26.5 498 33 498 33Z" fill="#9F9C80" fill-opacity="0.50" style="animation: pulse-outer 3s ease-in-out infinite; animation-delay: 0.9s;"/>
<path d="M85 30C85 30 237 27.5 291.5 0V62C235.5 36.5 85 30 85 30Z" fill="#9F9C80" fill-opacity="0.50" style="animation: pulse-outer 3s ease-in-out infinite; animation-delay: 0.9s;"/>

<!-- Layer 3 -->
<path d="M391 33C391 33 318 35.5 291.5 63V1C319.5 26.5 391 33 391 33Z" fill="#9F9C80" fill-opacity="0.70" style="animation: pulse-mid 3s ease-in-out infinite; animation-delay: 0.6s;"/>
<path d="M192 30C192 30 265 27.5 291.5 0V62C263.5 36.5 192 30 192 30Z" fill="#9F9C80" fill-opacity="0.70" style="animation: pulse-mid 3s ease-in-out infinite; animation-delay: 0.6s;"/>

<!-- Layer 2 -->
<path d="M337 33C337 33 303 35 291.5 62.5V0.5C304 26 337 33 337 33Z" fill="#9F9C80" fill-opacity="0.90" style="animation: pulse-inner 3s ease-in-out infinite; animation-delay: 0.3s;"/>
<path d="M246 30C246 30 280 28 291.5 0.5V62.5C279 37 246 30 246 30Z" fill="#9F9C80" fill-opacity="0.90" style="animation: pulse-inner 3s ease-in-out infinite; animation-delay: 0.3s;"/>

<!-- Layer 1 - Innermost (brightest) -->
<path d="M337 32.5C337 32.5 303 35 291.5 62.5V0.5C304 26 337 32.5 337 32.5Z" fill="#9F9C80" fill-opacity="0.98" style="animation: pulse-center 3s ease-in-out infinite; animation-delay: 0s;"/>
<path d="M246 30.5C246 30.5 280 28 291.5 0.5V62.5C279 37 246 30.5 246 30.5Z" fill="#9F9C80" fill-opacity="0.98" style="animation: pulse-center 3s ease-in-out infinite; animation-delay: 0s;"/>

</svg>
