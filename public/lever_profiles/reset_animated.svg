<svg width="583" height="61" viewBox="0 0 583 61" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  /* Slow breathing animation - center to edges, inside-out pulse */
  @keyframes pulse-center {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.7; }
  }
  
  @keyframes pulse-inner {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }
  
  @keyframes pulse-mid {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.35; }
  }
  
  @keyframes pulse-outer {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.2; }
  }
  
  @keyframes pulse-edge {
    0%, 100% { opacity: 0.05; }
    50% { opacity: 0.1; }
  }
</style>

<!-- Grid lines -->
<line x1="15.65" y1="61" x2="15.65" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="84.625" y1="61" x2="84.625" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<line x1="153.4" y1="61" x2="153.4" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="222.375" y1="61" x2="222.375" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="291.15" y1="61" x2="291.15" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="360.125" y1="61" x2="360.125" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="6 6"/>
<line x1="428.9" y1="61" x2="428.9" y2="-1.5299e-08" stroke="#848484" stroke-width="0.7"/>
<line x1="497.875" y1="61" x2="497.875" y2="-1.09278e-08" stroke="#848484" stroke-width="0.5" stroke-dasharray="12 12"/>
<path d="M567 61L567 -1.37091e-06" stroke="#848484" stroke-width="0.7"/>

<!-- Layered diamonds - same shape, staggered opacity pulse from center outward -->
<!-- Outermost layer - edge pulse (starts last, dimmest) -->
<path d="M16 33V28L291.5 10L567 28V33L291.5 53L16 33Z" fill="url(#paint0_radial)" style="animation: pulse-edge 3s ease-in-out infinite; animation-delay: 1.2s;"/>

<!-- Outer layer -->
<path d="M16 33V28L291.5 10L567 28V33L291.5 53L16 33Z" fill="url(#paint0_radial)" style="animation: pulse-outer 3s ease-in-out infinite; animation-delay: 0.9s;"/>

<!-- Mid layer -->
<path d="M16 33V28L291.5 10L567 28V33L291.5 53L16 33Z" fill="url(#paint0_radial)" style="animation: pulse-mid 3s ease-in-out infinite; animation-delay: 0.6s;"/>

<!-- Inner layer -->
<path d="M16 33V28L291.5 10L567 28V33L291.5 53L16 33Z" fill="url(#paint0_radial)" style="animation: pulse-inner 3s ease-in-out infinite; animation-delay: 0.3s;"/>

<!-- Center layer - brightest, starts first -->
<path d="M16 33V28L291.5 10L567 28V33L291.5 53L16 33Z" fill="url(#paint0_radial)" style="animation: pulse-center 3s ease-in-out infinite; animation-delay: 0s;"/>

<defs>
  <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientTransform="matrix(-321.506 -16.8929 -51.6213 73.5953 291.5 26.8929)" gradientUnits="userSpaceOnUse">
    <stop offset="0.00164139" stop-color="#615F4C"/>
    <stop offset="0.966346" stop-color="#171713"/>
  </radialGradient>
</defs>
</svg>
